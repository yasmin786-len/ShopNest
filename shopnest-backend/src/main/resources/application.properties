# =====================================================
# APPLICATION
# =====================================================
spring.application.name=ecommerce-platform-backend
server.port=8080
server.servlet.context-path=/

# =====================================================
# DATABASE - MySQL
# =====================================================
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=yasmin
spring.datasource.password=Rasul@0786
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# JPA / HIBERNATE
# =====================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =====================================================
# JWT CONFIG
# =====================================================
app.jwt.secret=ZWNvbW1lcmNlLXBsYXRmb3JtLXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nLW11c3QtYmUtbG9uZy1lbm91Z2g=
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# =====================================================
# CORS
# =====================================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# =====================================================
# FILE UPLOAD (if needed for images)
# =====================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =====================================================
# PAGINATION DEFAULTS
# =====================================================
spring.data.web.pageable.default-page-size=12
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.one-indexed-parameters=false

# =====================================================
# SWAGGER / OPENAPI
# =====================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# =====================================================
# LOGGING
# =====================================================
logging.level.root=INFO
logging.level.com.ecommerce.platform=DEBUG
logging.level.org.springframework.security=INFO

# =====================================================
# JACKSON
# =====================================================
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# =====================================================
# PAYMENT GATEWAY
# =====================================================
# Set to 'mock' for simulated payments (default). Implement PaymentGateway and
# set this to 'razorpay' / 'stripe' etc. to plug in a real provider later.
app.payment.provider=mock

# =====================================================
# ADMIN SEED DATA (used by DataSeeder)
# =====================================================
app.seed.enabled=true
app.seed.admin.email=admin@ecommerce.com
app.seed.admin.password=Admin@123
app.seed.customer.email=customer@ecommerce.com
app.seed.customer.password=Customer@123
